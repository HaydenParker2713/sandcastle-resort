<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Staff Dashboard – Sandcastle Resort</title>
  <link rel="stylesheet" href="/styles.css" />
  <script>if(localStorage.getItem('sc_theme')==='dark')document.documentElement.setAttribute('data-theme','dark');</script>
  <style>
    .staff-nav { background:#fff; border-bottom:1px solid #e5f0f0; position:sticky; top:0; z-index:200; box-shadow:0 2px 8px rgba(12,74,74,.07); }
    .staff-nav-inner { max-width:1100px; margin:0 auto; padding:12px 18px; display:flex; align-items:center; justify-content:space-between; }
    .staff-brand { display:flex; align-items:center; gap:10px; font-weight:700; color:#0c4a4a; font-size:16px; }
    .staff-brand img { width:38px; border-radius:8px; }
    .staff-badge { background:#dbeafe; color:#1e40af; font-size:11px; font-weight:700; padding:3px 10px; border-radius:12px; letter-spacing:.3px; }
    table { width:100%; border-collapse:collapse; font-size:14px; }
    th { background:#f0f9f9; color:#0c4a4a; padding:10px 10px; text-align:left; border-bottom:2px solid #e5f0f0; font-size:13px; white-space:nowrap; }
    td { padding:11px 10px; border-bottom:1px solid #f0f5f5; vertical-align:top; }
    tr:hover td { background:#fafcff; }
    .badge { display:inline-block; padding:3px 10px; border-radius:12px; font-size:12px; font-weight:700; }
    .badge-confirmed { background:#dbeafe; color:#1e40af; }
    .badge-cancelled { background:#f3f4f6; color:#6b7280; }
    .badge-open { background:#fee2e2; color:#991b1b; }
    .badge-in_progress { background:#fef3c7; color:#92400e; }
    .badge-closed { background:#d1fae5; color:#065f46; }
    select.inline { padding:5px 8px; border-radius:6px; border:1px solid #d1e8e8; font-size:13px; background:#fff; }
    .sub-muted { color:#9ca3af; font-size:12px; }
    .notify-bar { padding:10px 16px; border-radius:8px; margin-bottom:14px; font-size:14px; font-weight:500; display:none; }
    .notify-bar.success { background:#d1fae5; color:#065f46; display:block; }
    .notify-bar.error   { background:#fee2e2; color:#991b1b; display:block; }
    .live-dot { display:inline-block; width:8px; height:8px; border-radius:50%; background:#10b981; margin-right:6px; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    .staff-field-label { font-size:13px; font-weight:600; color:#0c4a4a; display:block; margin-bottom:5px; }
    .emoji-opt { width:40px; height:40px; font-size:1.3rem; border-radius:50%; border:2.5px solid transparent; background:#f0f9f9; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:.12s; }
    .emoji-opt:hover   { border-color:#0ea5a4; transform:scale(1.1); }
    .emoji-opt.selected { border-color:#0c4a4a; box-shadow:0 0 0 3px rgba(14,165,164,.2); }
    .event-list-item { display:flex; align-items:flex-start; gap:14px; padding:14px 0; border-bottom:1px solid #e8f2f2; }
    .event-list-item:last-child { border-bottom:none; }
    .event-list-thumb { width:72px; height:56px; border-radius:8px; object-fit:cover; flex-shrink:0; }
    .event-list-emoji { width:72px; height:56px; border-radius:8px; background:#e8f5f5; display:flex; align-items:center; justify-content:center; font-size:1.8rem; flex-shrink:0; }
    [data-theme="dark"] .staff-field-label { color:#5eead4; }
    [data-theme="dark"] #eventForm input,
    [data-theme="dark"] #eventForm textarea { background:#0f172a; border-color:#334155; color:#e2e8f0; }
    [data-theme="dark"] .emoji-opt { background:#1e293b; }
    [data-theme="dark"] .event-list-item { border-bottom-color:#334155; }
    [data-theme="dark"] .event-list-emoji { background:#1e3a3a; }
  </style>
</head>
<body>

  <nav class="staff-nav">
    <div class="staff-nav-inner">
      <div class="staff-brand">
        <img src="/logo.svg" alt="logo" />
        Sandcastle Resort
        <span class="staff-badge">STAFF</span>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <span id="staffWelcome" style="font-size:14px;font-weight:600;color:#0c4a4a"></span>
        <button id="themeToggleBtn" class="theme-toggle" title="Toggle dark / light mode">🌙</button>
        <button id="guestViewBtn" class="btn-secondary" style="font-size:13px;padding:7px 14px">Guest View</button>
        <button id="staffLogoutBtn" class="btn-ghost" style="font-size:13px;padding:7px 14px">Logout</button>
      </div>
    </div>
  </nav>

  <main class="container" style="padding-top:20px;padding-bottom:40px">

    <div id="staffNotify" class="notify-bar"></div>

    <div style="display:flex;align-items:center;gap:8px;margin-bottom:18px">
      <span class="live-dot"></span>
      <span style="font-size:13px;color:#6b7280">Live — updates every 10 seconds</span>
    </div>

    <div class="dash-tabs">
      <button class="dash-tab-btn active" data-tab="tab-reservations">📋 Reservations</button>
      <button class="dash-tab-btn" data-tab="tab-tickets">🔧 Tickets</button>
      <button class="dash-tab-btn" data-tab="tab-events">🎉 Events</button>
    </div>

    <div id="tab-reservations" class="dash-panel active card">
      <h2>All Reservations</h2>
      <div style="overflow-x:auto" id="staffReservations">Loading...</div>
    </div>

    <div id="tab-tickets" class="dash-panel card">
      <h2>Maintenance &amp; Housekeeping Tickets</h2>
      <div style="overflow-x:auto" id="staffTickets">Loading...</div>
    </div>

    <!-- ── Events tab ──────────────────────────────────────────────────────── -->
    <div id="tab-events" class="dash-panel">

      <div class="card" style="max-width:560px;margin-bottom:20px">
        <h2>Post a New Event</h2>
        <div id="eventMsg" class="notify-bar" style="margin-bottom:14px"></div>
        <form id="eventForm" enctype="multipart/form-data">
          <div style="display:flex;flex-direction:column;gap:12px">

            <div>
              <label class="staff-field-label">Title *</label>
              <input type="text" id="evTitle" placeholder="Event name" style="width:100%;padding:10px 12px;border:1.5px solid #d1e8e8;border-radius:8px;font-size:14px;box-sizing:border-box" required />
            </div>

            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
              <div>
                <label class="staff-field-label">Date</label>
                <input type="date" id="evDate" style="width:100%;padding:10px 12px;border:1.5px solid #d1e8e8;border-radius:8px;font-size:14px;box-sizing:border-box" />
              </div>
              <div>
                <label class="staff-field-label">Time</label>
                <input type="text" id="evTime" placeholder="e.g. 7:00 PM" style="width:100%;padding:10px 12px;border:1.5px solid #d1e8e8;border-radius:8px;font-size:14px;box-sizing:border-box" />
              </div>
            </div>

            <div>
              <label class="staff-field-label">Location</label>
              <input type="text" id="evLocation" placeholder="e.g. Beach Terrace" style="width:100%;padding:10px 12px;border:1.5px solid #d1e8e8;border-radius:8px;font-size:14px;box-sizing:border-box" />
            </div>

            <div>
              <label class="staff-field-label">Ticket / Price Info</label>
              <input type="text" id="evTicket" placeholder="e.g. Free for guests  or  $25 per person" style="width:100%;padding:10px 12px;border:1.5px solid #d1e8e8;border-radius:8px;font-size:14px;box-sizing:border-box" />
            </div>

            <div>
              <label class="staff-field-label">Description</label>
              <textarea id="evDesc" rows="3" placeholder="Short description of the event…" style="width:100%;padding:10px 12px;border:1.5px solid #d1e8e8;border-radius:8px;font-size:14px;box-sizing:border-box;resize:vertical;font-family:inherit"></textarea>
            </div>

            <div>
              <label class="staff-field-label">Banner Emoji <span style="font-weight:400;color:#9ca3af">(shown if no image)</span></label>
              <div id="emojiPicker" style="display:flex;flex-wrap:wrap;gap:8px;margin-top:6px"></div>
              <input type="hidden" id="evEmoji" value="🎉" />
            </div>

            <div>
              <label class="staff-field-label">Event Image <span style="font-weight:400;color:#9ca3af">(optional · max 5 MB)</span></label>
              <input type="file" id="evImage" accept="image/*" style="font-size:13px" />
              <div id="evImagePreview" style="margin-top:8px;display:none">
                <img id="evPreviewImg" src="" alt="preview" style="max-width:100%;max-height:160px;border-radius:8px;object-fit:cover" />
              </div>
            </div>

            <button type="submit" id="evSubmitBtn" class="btn-primary" style="align-self:flex-start;padding:11px 28px">Post Event</button>
          </div>
        </form>
      </div>

      <div class="card">
        <h2>Posted Events</h2>
        <div id="staffEventList"><p class="muted" style="font-size:14px">Loading…</p></div>
      </div>

    </div>

  </main>

  <script src="/api.js"></script>
  <script src="/staff.js"></script>
  <script>
    document.querySelectorAll('.dash-tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.dash-tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.dash-panel').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(btn.dataset.tab).classList.add('active');
      });
    });
  </script>
</body>
</html>
