<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard - Sandcastle Resort</title>
  <link rel="stylesheet" href="/styles.css" />
  <style>
    .tab-nav { display: flex; gap: 8px; margin-bottom: 18px; flex-wrap: wrap; }
    .tab-btn { padding: 10px 22px; border: none; border-radius: 8px; cursor: pointer; background: #eef6f6; color: #0ea5a4; font-weight: 600; font-size: 14px; }
    .tab-btn.active { background: #0ea5a4; color: #fff; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th { background: #f0f9f9; color: #0f766e; padding: 10px 8px; text-align: left; border-bottom: 2px solid #e6eef5; white-space: nowrap; }
    td { padding: 10px 8px; border-bottom: 1px solid #f0f0f0; vertical-align: top; }
    tr:hover td { background: #fafcff; }
    .badge { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; }
    .badge-unpaid { background: #fee2e2; color: #991b1b; }
    .badge-paid { background: #d1fae5; color: #065f46; }
    .badge-confirmed { background: #dbeafe; color: #1e40af; }
    .badge-cancelled { background: #f3f4f6; color: #6b7280; }
    .badge-available { background: #d1fae5; color: #065f46; }
    .badge-maintenance { background: #fef3c7; color: #92400e; }
    .badge-inactive { background: #f3f4f6; color: #6b7280; }
    .badge-open { background: #fee2e2; color: #991b1b; }
    .badge-in_progress { background: #fef3c7; color: #92400e; }
    .badge-closed { background: #d1fae5; color: #065f46; }
    .badge-admin { background: #ede9fe; color: #5b21b6; }
    .badge-staff { background: #dbeafe; color: #1e40af; }
    .badge-guest { background: #f3f4f6; color: #374151; }
    select.inline { padding: 5px 8px; border-radius: 6px; border: 1px solid #e6eef5; font-size: 13px; background: #fff; }
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; margin-bottom: 20px; }
    .stat-card { background: #fff; border-radius: 10px; padding: 18px 16px; box-shadow: 0 6px 18px rgba(12,15,20,0.06); text-align: center; }
    .stat-card .num { font-size: 2.2rem; font-weight: 700; color: #0ea5a4; }
    .stat-card .lbl { color: #6b7280; font-size: 13px; margin-top: 4px; }
    .admin-message { padding: 10px 14px; border-radius: 8px; margin-bottom: 14px; display: none; font-weight: 500; }
    .admin-message.success { background: #d1fae5; color: #065f46; display: block; }
    .admin-message.error { background: #fee2e2; color: #991b1b; display: block; }
    .profile-area { display: flex; align-items: center; gap: 10px; }
    .sub-muted { color: #999; font-size: 12px; }
    .table-wrap { overflow-x: auto; }
  </style>
</head>
<body>
  <header class="container header">
    <div class="brand">
      <img src="/logo.svg" alt="Sandcastle Resort logo" class="logo" />
      <div>
        <h1>Admin Dashboard</h1>
        <p id="adminWelcome" class="muted">Loading...</p>
      </div>
    </div>
    <div class="profile-area">
      <button id="guestViewBtn" class="btn-secondary">Guest View</button>
      <button id="adminLogoutBtn" class="btn-ghost">Logout</button>
    </div>
  </header>

  <main class="container">
    <div id="adminMessage" class="admin-message"></div>

    <div class="stat-grid">
      <div class="stat-card">
        <div class="num" id="statReservations">-</div>
        <div class="lbl">Total Reservations</div>
      </div>
      <div class="stat-card">
        <div class="num" id="statUnpaid">-</div>
        <div class="lbl">Unpaid Invoices</div>
      </div>
      <div class="stat-card">
        <div class="num" id="statTickets">-</div>
        <div class="lbl">Open Tickets</div>
      </div>
      <div class="stat-card">
        <div class="num" id="statUsers">-</div>
        <div class="lbl">Registered Users</div>
      </div>
    </div>

    <div class="tab-nav">
      <button class="tab-btn active" data-tab="reservations">Reservations</button>
      <button class="tab-btn" data-tab="units">Units</button>
      <button class="tab-btn" data-tab="tickets">Tickets</button>
      <button class="tab-btn" data-tab="users">Users</button>
    </div>

    <div id="tab-reservations" class="tab-panel active card">
      <h2>All Reservations</h2>
      <div class="table-wrap" id="reservationsTable">Loading...</div>
    </div>

    <div id="tab-units" class="tab-panel card">
      <h2>Units</h2>
      <div class="table-wrap" id="unitsTable">Loading...</div>
    </div>

    <div id="tab-tickets" class="tab-panel card">
      <h2>Maintenance &amp; Housekeeping Tickets</h2>
      <div class="table-wrap" id="ticketsTable">Loading...</div>
    </div>

    <div id="tab-users" class="tab-panel card">
      <h2>Registered Users</h2>
      <div class="table-wrap" id="usersTable">Loading...</div>
    </div>
  </main>

  <script src="/admin.js"></script>
</body>
</html>
