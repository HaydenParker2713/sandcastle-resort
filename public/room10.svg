  <ellipse cx="52"  cy="255" rx="18" ry="5" fill="#fbbf24" opacity="0.2"/>
  <ellipse cx="110" cy="258" rx="18" ry="5" fill="#fef08a" opacity="0.18"/>
  <ellipse cx="168" cy="255" rx="18" ry="5" fill="#fbbf24" opacity="0.2"/>
  <ellipse cx="385" cy="255" rx="18" ry="5" fill="#fef08a" opacity="0.2"/>
  <ellipse cx="443" cy="258" rx="18" ry="5" fill="#fbbf24" opacity="0.18"/>
  <ellipse cx="501" cy="255" rx="18" ry="5" fill="#fef08a" opacity="0.2"/>
  <!-- Pool edge -->
  <rect x="55" y="228" width="490" height="148" fill="none" stroke="#0e7490" stroke-width="3" rx="10"/>
  <!-- Lounge chairs (silhouette) -->
  <rect x="4"   y="305" width="44" height="14" fill="#44403c" rx="3"/>
  <rect x="4"   y="294" width="16" height="13" fill="#44403c" rx="3"/>
  <rect x="552" y="305" width="44" height="14" fill="#44403c" rx="3"/>
  <rect x="552" y="294" width="16" height="13" fill="#44403c" rx="3"/>
