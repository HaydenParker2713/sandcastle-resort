<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="sky10" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="50%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#1e4d8c"/>
    </linearGradient>
    <linearGradient id="pool10" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e7490"/>
      <stop offset="40%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#083344"/>
    </linearGradient>
    <linearGradient id="surr10" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#292524"/>
      <stop offset="100%" stop-color="#1c1917"/>
    </linearGradient>
    <radialGradient id="glow10" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Night sky -->
  <rect width="600" height="220" fill="url(#sky10)"/>
  <!-- Stars -->
  <circle cx="30"  cy="18"  r="1.5" fill="white" opacity="0.85"/>
  <circle cx="80"  cy="40"  r="1.2" fill="white" opacity="0.7"/>
  <circle cx="145" cy="22"  r="1"   fill="white" opacity="0.6"/>
  <circle cx="200" cy="50"  r="1.5" fill="white" opacity="0.75"/>
  <circle cx="265" cy="15"  r="1"   fill="white" opacity="0.65"/>
  <circle cx="330" cy="38"  r="1.3" fill="white" opacity="0.8"/>
  <circle cx="390" cy="20"  r="1.2" fill="white" opacity="0.7"/>
  <circle cx="445" cy="45"  r="1"   fill="white" opacity="0.6"/>
  <circle cx="510" cy="25"  r="1.5" fill="white" opacity="0.8"/>
  <circle cx="565" cy="42"  r="1.2" fill="white" opacity="0.7"/>
  <circle cx="55"  cy="70"  r="1"   fill="white" opacity="0.55"/>
  <circle cx="160" cy="80"  r="1.3" fill="white" opacity="0.65"/>
  <circle cx="290" cy="65"  r="1"   fill="white" opacity="0.6"/>
  <circle cx="440" cy="78"  r="1.2" fill="white" opacity="0.65"/>
  <circle cx="540" cy="65"  r="1"   fill="white" opacity="0.55"/>
  <!-- Building outline -->
  <rect x="0" y="130" width="600" height="92" fill="#1c1a18"/>
  <!-- Building windows (lit) -->
  <rect x="20"  y="148" width="35" height="28" fill="#fbbf24" rx="2" opacity="0.85"/>
  <rect x="75"  y="148" width="35" height="28" fill="#fef08a" rx="2" opacity="0.8"/>
  <rect x="130" y="148" width="35" height="28" fill="#fbbf24" rx="2" opacity="0.9"/>
  <rect x="185" y="158" width="35" height="18" fill="#93c5fd" rx="2" opacity="0.7"/>
  <rect x="350" y="148" width="35" height="28" fill="#fef08a" rx="2" opacity="0.85"/>
  <rect x="405" y="148" width="35" height="28" fill="#fbbf24" rx="2" opacity="0.8"/>
  <rect x="460" y="148" width="35" height="28" fill="#fef08a" rx="2" opacity="0.9"/>
  <rect x="515" y="158" width="35" height="18" fill="#93c5fd" rx="2" opacity="0.7"/>
