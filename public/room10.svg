  <ellipse cx="300" cy="368" rx="30" ry="10" fill="#22d3ee" opacity="0.5"/>
  <ellipse cx="470" cy="360" rx="30" ry="10" fill="#22d3ee" opacity="0.5"/>
  <!-- Pool surface ripple shimmer -->
  <path d="M80,248  Q130,242 185,248 Q240,254 295,248" stroke="#67e8f9" stroke-width="1.5" fill="none" opacity="0.3"/>
  <path d="M310,268 Q365,262 420,268 Q475,274 530,268" stroke="#67e8f9" stroke-width="1.5" fill="none" opacity="0.25"/>
  <path d="M80,300  Q160,294 240,300 Q320,306 400,300" stroke="#22d3ee" stroke-width="1.5" fill="none" opacity="0.2"/>
