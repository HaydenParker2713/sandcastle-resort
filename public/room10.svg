  <path d="M0,218 Q150,226 300,220 Q450,214 600,218" stroke="#fef08a" stroke-width="1.5" fill="none" opacity="0.6"/>
  <circle cx="0"   cy="218" r="3" fill="#fef08a" opacity="0.8"/>
  <circle cx="55"  cy="224" r="3" fill="#fef08a" opacity="0.8"/>
  <circle cx="110" cy="226" r="3" fill="#fef08a" opacity="0.8"/>
  <circle cx="165" cy="223" r="3" fill="#fef08a" opacity="0.8"/>
  <circle cx="220" cy="220" r="3" fill="#fef08a" opacity="0.8"/>
  <circle cx="300" cy="220" r="3" fill="#fef08a" opacity="0.8"/>
  <circle cx="380" cy="216" r="3" fill="#fef08a" opacity="0.8"/>
  <circle cx="435" cy="216" r="3" fill="#fef08a" opacity="0.8"/>
  <circle cx="490" cy="218" r="3" fill="#fef08a" opacity="0.8"/>
  <circle cx="545" cy="217" r="3" fill="#fef08a" opacity="0.8"/>
  <circle cx="600" cy="218" r="3" fill="#fef08a" opacity="0.8"/>
