  <circle cx="85"  cy="285" r="5"  fill="#fbbf24"/>
  <circle cx="115" cy="302" r="9"  fill="#fb923c"/>
  <circle cx="115" cy="302" r="4.5" fill="#fef08a"/>
  <circle cx="60"  cy="310" r="9"  fill="#f43f5e"/>
