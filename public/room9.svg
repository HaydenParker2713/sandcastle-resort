      <stop offset="0%" stop-color="#0c4a6e"/>
      <stop offset="40%" stop-color="#0ea5e9"/>
      <stop offset="70%" stop-color="#fed84b" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#fef3c7"/>
