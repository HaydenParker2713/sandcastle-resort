  <ellipse cx="-4" cy="305" rx="14" ry="5" fill="#15803d" transform="rotate(-38 -4 305)"/>
  <ellipse cx="24" cy="305" rx="14" ry="5" fill="#15803d" transform="rotate(32 24 305)"/>
