  <rect x="587" y="340" width="8" height="10" fill="#92400e" rx="1"/>
  <ellipse cx="591" cy="338" rx="10" ry="4" fill="#b45309"/>
  <rect x="589" y="300" width="6" height="42" fill="#78350f" rx="2"/>
  <ellipse cx="592" cy="297" rx="18" ry="6" fill="#16a34a" transform="rotate(6 592 297)"/>
  <ellipse cx="608" cy="305" rx="14" ry="5" fill="#15803d" transform="rotate(38 608 305)"/>
