<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password – Sandcastle Resort</title>
  <link rel="stylesheet" href="/styles.css" />
  <style>
    body { min-height: 100vh; display: flex; flex-direction: column; background: #f0f7f7; }
    .auth-wrap {
      flex: 1; display: flex; align-items: center; justify-content: center; padding: 32px 16px;
    }
    .auth-card {
      background: #fff; border-radius: 18px; box-shadow: 0 4px 24px rgba(12,74,74,.10);
      padding: 40px 36px; width: 100%; max-width: 400px;
    }
    .auth-logo {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      margin-bottom: 28px; color: #0c4a4a; font-weight: 800; font-size: 1.1rem;
    }
    .auth-logo img { width: 36px; border-radius: 8px; }
    h2 { margin: 0 0 6px; color: #0c4a4a; font-size: 1.4rem; font-weight: 800; }
    .sub { color: #6b7280; font-size: 14px; margin: 0 0 24px; }
    label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 5px; }
    input[type="password"] {
      width: 100%; box-sizing: border-box; padding: 11px 14px; border: 1.5px solid #d1e8e8;
      border-radius: 9px; font-size: 14px; outline: none; transition: border-color .15s;
      margin-bottom: 18px;
    }
    input[type="password"]:focus { border-color: #0ea5a4; }
    .btn-submit {
      width: 100%; padding: 13px; background: linear-gradient(135deg,#0c4a4a,#0ea5a4);
      color: #fff; font-weight: 700; font-size: 15px; border: none; border-radius: 10px;
      cursor: pointer; transition: opacity .15s;
    }
    .btn-submit:disabled { opacity: .6; cursor: default; }
    .msg { border-radius: 9px; padding: 12px 14px; font-size: 13px; margin-bottom: 16px; display: none; }
    .msg.success { background: #d1fae5; color: #065f46; }
    .msg.error   { background: #fee2e2; color: #991b1b; }
    .hint { font-size: 12px; color: #9ca3af; margin: -12px 0 18px; }
    .back-link { display: block; text-align: center; margin-top: 20px; font-size: 13px; color: #0ea5a4; font-weight: 600; text-decoration: none; }
    .back-link:hover { text-decoration: underline; }
    #invalidState { text-align: center; padding: 8px 0; }
    #invalidState p { color: #991b1b; font-size: 14px; margin-bottom: 16px; }
  </style>
</head>
<body>

  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-logo">
        <img src="/logo.svg" alt="logo" />
        Sandcastle Resort
      </div>

      <!-- Shown when token is missing or already used -->
      <div id="invalidState" style="display:none">
        <h2>Link expired</h2>
        <p>This password reset link is invalid or has already been used. Reset links expire after 1 hour.</p>
        <a href="/forgot-password" class="btn-submit" style="display:inline-block;text-decoration:none;text-align:center;padding:13px 0;width:100%;box-sizing:border-box">
          Request a new link
        </a>
      </div>

      <!-- Shown when token looks valid -->
      <div id="resetForm">
        <h2>Choose a new password</h2>
        <p class="sub">Enter a new password for your account.</p>

        <div class="msg" id="msg"></div>

        <form id="form" novalidate>
          <label for="newPassword">New password</label>
          <input type="password" id="newPassword" placeholder="At least 8 characters" autocomplete="new-password" required />
          <p class="hint">Minimum 8 characters</p>

          <label for="confirmPassword">Confirm new password</label>
          <input type="password" id="confirmPassword" placeholder="Repeat your new password" autocomplete="new-password" required />

          <button type="submit" class="btn-submit" id="submitBtn">Set new password</button>
        </form>
      </div>

      <a href="/" class="back-link">← Back to home</a>
    </div>
  </div>

  <script src="/api.js"></script>
  <script src="/reset-password.js"></script>
</body>
</html>
