<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="sky11" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c1a2e"/>
      <stop offset="30%" stop-color="#1e4d8c"/>
      <stop offset="60%" stop-color="#fb923c"/>
      <stop offset="80%" stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#fef9c3"/>
    </linearGradient>
    <linearGradient id="ocean11" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0369a1"/>
      <stop offset="100%" stop-color="#0c3d5e"/>
    </linearGradient>
    <linearGradient id="sand11" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
  </defs>
  <!-- Sky -->
  <rect width="600" height="260" fill="url(#sky11)"/>
  <!-- Sunrise glow horizon -->
  <ellipse cx="300" cy="258" rx="300" ry="32" fill="#fb923c" opacity="0.35"/>
  <!-- Stars fading -->
  <circle cx="45"  cy="25"  r="1.3" fill="white" opacity="0.6"/>
  <circle cx="110" cy="15"  r="1"   fill="white" opacity="0.5"/>
  <circle cx="175" cy="40"  r="1.2" fill="white" opacity="0.55"/>
  <circle cx="60"  cy="55"  r="1"   fill="white" opacity="0.45"/>
  <!-- Sun just risen -->
  <circle cx="300" cy="250" r="60" fill="#fed84b" opacity="0.22"/>
  <circle cx="300" cy="250" r="40" fill="#fef08a" opacity="0.45"/>
  <circle cx="300" cy="250" r="22" fill="#fef9c3" opacity="0.85"/>
  <!-- Ocean -->
  <rect y="258" width="600" height="90" fill="url(#ocean11)"/>
  <!-- Sun reflection on ocean -->
  <ellipse cx="300" cy="272" rx="65" ry="11" fill="#fed84b" opacity="0.3"/>
  <!-- Waves -->
  <path d="M0,268 C70,260 150,278 230,268 C310,258 390,276 470,268 C528,262 562,272 600,268 L600,280 L0,280Z" fill="#38bdf8" opacity="0.45"/>
  <path d="M0,295 C80,287 160,305 240,295 C320,285 400,303 480,295 C538,289 570,299 600,295 L600,310 L0,310Z" fill="#0ea5e9" opacity="0.35"/>
  <!-- Sandy beach -->
  <rect y="343" width="600" height="57" fill="url(#sand11)"/>
  <!-- Shoreline foam -->
  <path d="M0,343 C90,338 190,348 300,343 C410,338 510,348 600,343 L600,350 L0,350Z" fill="white" opacity="0.55"/>
  <!-- Footprints in sand -->
  <ellipse cx="220" cy="370" rx="5" ry="8"  fill="#d97706" opacity="0.35" transform="rotate(-8 220 370)"/>
  <ellipse cx="232" cy="362" rx="5" ry="8"  fill="#d97706" opacity="0.35" transform="rotate(8 232 362)"/>
  <ellipse cx="244" cy="372" rx="5" ry="8"  fill="#d97706" opacity="0.35" transform="rotate(-8 244 372)"/>
  <ellipse cx="256" cy="363" rx="5" ry="8"  fill="#d97706" opacity="0.35" transform="rotate(8 256 363)"/>
  <!-- Seashells -->
  <ellipse cx="80"  cy="380" rx="7" ry="5" fill="#fef3c7" opacity="0.75" transform="rotate(-20 80 380)"/>
  <ellipse cx="440" cy="375" rx="6" ry="4" fill="#fde68a" opacity="0.75" transform="rotate(15 440 375)"/>
  <ellipse cx="530" cy="385" rx="7" ry="5" fill="#fef3c7" opacity="0.7"  transform="rotate(-10 530 385)"/>
  <!-- Seagulls -->
  <path d="M130,205 Q136,200 142,205" stroke="#1e3a5f" stroke-width="2" fill="none"/>
  <path d="M150,202 Q156,197 162,202" stroke="#1e3a5f" stroke-width="2" fill="none"/>
  <path d="M390,195 Q396,190 402,195" stroke="#1e3a5f" stroke-width="2" fill="none"/>
  <path d="M410,192 Q416,187 422,192" stroke="#1e3a5f" stroke-width="2" fill="none"/>
  <!-- Distant sailboat -->
  <path d="M500,252 L510,238 L518,252Z" fill="#0c3d5e" opacity="0.65"/>
  <line x1="510" y1="252" x2="510" y2="238" stroke="#0c3d5e" stroke-width="1.5" opacity="0.65"/>
</svg>
