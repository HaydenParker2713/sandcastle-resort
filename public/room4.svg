<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="sky4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2e1065"/>
      <stop offset="38%" stop-color="#7c3aed"/>
      <stop offset="68%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fef3c7"/>
    </linearGradient>
    <linearGradient id="pool4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#164e63"/>
    </linearGradient>
    <linearGradient id="surr4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e5d9c5"/>
      <stop offset="100%" stop-color="#c8b99a"/>
    </linearGradient>
  </defs>
  <!-- Sky -->
  <rect width="600" height="242" fill="url(#sky4)"/>
  <!-- Stars -->
  <circle cx="50" cy="22" r="1.2" fill="white" opacity="0.8"/>
  <circle cx="128" cy="38" r="1" fill="white" opacity="0.6"/>
  <circle cx="198" cy="14" r="1.4" fill="white" opacity="0.7"/>
  <circle cx="78" cy="58" r="1" fill="white" opacity="0.5"/>
  <circle cx="258" cy="28" r="1.2" fill="white" opacity="0.6"/>
  <!-- Moon -->
  <circle cx="520" cy="52" r="30" fill="#fef9c3" opacity="0.92"/>
  <circle cx="510" cy="44" r="22" fill="#bfdbfe" opacity="0.4"/>
  <!-- Pool surround -->
  <rect y="238" width="600" height="162" fill="url(#surr4)"/>
  <!-- Pool -->
  <rect x="60" y="247" width="480" height="138" fill="url(#pool4)" rx="10"/>
  <!-- Pool glow -->
  <ellipse cx="300" cy="265" rx="160" ry="16" fill="#67e8f9" opacity="0.22"/>
  <!-- Moon reflection -->
  <ellipse cx="300" cy="315" rx="42" ry="9" fill="#fef9c3" opacity="0.18"/>
  <!-- Pool shimmer -->
  <path d="M80,278 Q130,272 185,278 Q240,284 295,278" stroke="white" stroke-width="1.5" fill="none" opacity="0.18"/>
  <path d="M310,298 Q365,292 420,298 Q475,304 530,298" stroke="white" stroke-width="1.5" fill="none" opacity="0.18"/>
  <!-- Pool edge -->
  <rect x="60" y="247" width="480" height="138" fill="none" stroke="#0891b2" stroke-width="3" rx="10"/>
  <!-- Underwater pool lights -->
  <ellipse cx="150" cy="368" rx="28" ry="9" fill="#22d3ee" opacity="0.38"/>
  <ellipse cx="450" cy="368" rx="28" ry="9" fill="#22d3ee" opacity="0.38"/>
  <!-- Lounge chairs -->
  <rect x="4" y="302" width="48" height="16" fill="#b45309" rx="3" opacity="0.9"/>
  <rect x="4" y="291" width="18" height="13" fill="#b45309" rx="3" opacity="0.9"/>
  <rect x="548" y="302" width="48" height="16" fill="#b45309" rx="3" opacity="0.9"/>
  <rect x="548" y="291" width="18" height="13" fill="#b45309" rx="3" opacity="0.9"/>
  <!-- String lights -->
  <path d="M0,222 Q150,232 300,226 Q450,220 600,222" stroke="#fef08a" stroke-width="1.5" fill="none" opacity="0.7"/>
  <circle cx="0"   cy="222" r="3" fill="#fef08a" opacity="0.85"/>
  <circle cx="60"  cy="228" r="3" fill="#fef08a" opacity="0.85"/>
  <circle cx="120" cy="231" r="3" fill="#fef08a" opacity="0.85"/>
  <circle cx="180" cy="229" r="3" fill="#fef08a" opacity="0.85"/>
  <circle cx="240" cy="226" r="3" fill="#fef08a" opacity="0.85"/>
  <circle cx="300" cy="226" r="3" fill="#fef08a" opacity="0.85"/>
  <circle cx="360" cy="222" r="3" fill="#fef08a" opacity="0.85"/>
  <circle cx="420" cy="221" r="3" fill="#fef08a" opacity="0.85"/>
  <circle cx="480" cy="223" r="3" fill="#fef08a" opacity="0.85"/>
  <circle cx="540" cy="222" r="3" fill="#fef08a" opacity="0.85"/>
  <circle cx="600" cy="222" r="3" fill="#fef08a" opacity="0.85"/>
  <!-- Palm silhouette left -->
  <rect x="3" y="138" width="10" height="108" fill="#1c0a00" rx="3"/>
  <ellipse cx="8" cy="132" rx="30" ry="10" fill="#14532d" opacity="0.9" transform="rotate(-5 8 132)"/>
  <ellipse cx="-14" cy="143" rx="26" ry="8" fill="#166534" opacity="0.8" transform="rotate(-38 -14 143)"/>
  <ellipse cx="32" cy="143" rx="26" ry="8" fill="#166534" opacity="0.8" transform="rotate(32 32 143)"/>
  <!-- Palm silhouette right -->
  <rect x="587" y="138" width="10" height="108" fill="#1c0a00" rx="3"/>
  <ellipse cx="592" cy="132" rx="30" ry="10" fill="#14532d" opacity="0.9" transform="rotate(5 592 132)"/>
  <ellipse cx="568" cy="143" rx="26" ry="8" fill="#166534" opacity="0.8" transform="rotate(-32 568 143)"/>
  <ellipse cx="614" cy="143" rx="26" ry="8" fill="#166534" opacity="0.8" transform="rotate(38 614 143)"/>
</svg>
