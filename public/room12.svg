<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="sky12" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="30%" stop-color="#1e3a5f"/>
      <stop offset="55%" stop-color="#c2511a"/>
      <stop offset="75%" stop-color="#f97316"/>
      <stop offset="90%" stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#fef3c7"/>
    </linearGradient>
    <linearGradient id="ocean12" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a6fa0"/>
      <stop offset="100%" stop-color="#0a2d45"/>
    </linearGradient>
    <linearGradient id="deck12" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7ede0"/>
      <stop offset="100%" stop-color="#dfc9a8"/>
    </linearGradient>
  </defs>
  <!-- Sky -->
  <rect width="600" height="292" fill="url(#sky12)"/>
  <!-- Stars -->
  <circle cx="55"  cy="22"  r="1.5" fill="white" opacity="0.8"/>
  <circle cx="148" cy="14"  r="1"   fill="white" opacity="0.7"/>
  <circle cx="225" cy="38"  r="1.5" fill="white" opacity="0.6"/>
  <circle cx="318" cy="16"  r="1"   fill="white" opacity="0.8"/>
  <circle cx="78"  cy="52"  r="1"   fill="white" opacity="0.5"/>
  <circle cx="400" cy="28"  r="1.2" fill="white" opacity="0.6"/>
  <circle cx="480" cy="18"  r="1"   fill="white" opacity="0.7"/>
  <circle cx="555" cy="38"  r="1.3" fill="white" opacity="0.65"/>
  <!-- Sun setting large -->
  <circle cx="480" cy="200" r="75" fill="#fed84b" opacity="0.18"/>
  <circle cx="480" cy="200" r="55" fill="#f97316" opacity="0.35"/>
  <circle cx="480" cy="200" r="36" fill="#fcd34d" opacity="0.75"/>
  <circle cx="480" cy="200" r="22" fill="#fef9c3" opacity="0.95"/>
