  <path d="M160,248 L172,230 L180,248Z" fill="#0c3d5e" opacity="0.6"/>
  <line x1="172" y1="248" x2="172" y2="230" stroke="#0c3d5e" stroke-width="1.5" opacity="0.6"/>
  <path d="M330,243 L340,228 L348,243Z" fill="#0c3d5e" opacity="0.55"/>
  <line x1="340" y1="243" x2="340" y2="228" stroke="#0c3d5e" stroke-width="1.5" opacity="0.55"/>
  <!-- Two palms flanking -->
  <rect x="20" y="112" width="13" height="200" fill="#7c4b0c" rx="4"/>
  <ellipse cx="26" cy="104" rx="40" ry="15" fill="#22c55e" transform="rotate(-5 26 104)"/>
  <ellipse cx="-2" cy="116" rx="36" ry="12" fill="#16a34a" transform="rotate(-42 -2 116)"/>
  <ellipse cx="56" cy="116" rx="36" ry="12" fill="#16a34a" transform="rotate(38 56 116)"/>
  <ellipse cx="6"  cy="98"  rx="28" ry="10" fill="#4ade80" transform="rotate(-60 6 98)"/>
  <ellipse cx="46" cy="98"  rx="28" ry="10" fill="#4ade80" transform="rotate(55 46 98)"/>
  <rect x="567" y="112" width="13" height="200" fill="#7c4b0c" rx="4"/>
  <ellipse cx="574" cy="104" rx="40" ry="15" fill="#22c55e" transform="rotate(5 574 104)"/>
  <ellipse cx="544" cy="116" rx="36" ry="12" fill="#16a34a" transform="rotate(-38 544 116)"/>
  <ellipse cx="604" cy="116" rx="36" ry="12" fill="#16a34a" transform="rotate(42 604 116)"/>
  <ellipse cx="554" cy="98"  rx="28" ry="10" fill="#4ade80" transform="rotate(-55 554 98)"/>
  <ellipse cx="594" cy="98"  rx="28" ry="10" fill="#4ade80" transform="rotate(60 594 98)"/>
