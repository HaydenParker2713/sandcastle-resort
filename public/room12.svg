  <rect x="8"   y="314" width="5" height="40" fill="#c5b49a" rx="2"/>
  <rect x="44"  y="314" width="5" height="40" fill="#c5b49a" rx="2"/>
  <rect x="80"  y="314" width="5" height="40" fill="#c5b49a" rx="2"/>
  <rect x="116" y="314" width="5" height="40" fill="#c5b49a" rx="2"/>
  <rect x="152" y="314" width="5" height="40" fill="#c5b49a" rx="2"/>
  <rect x="188" y="314" width="5" height="40" fill="#c5b49a" rx="2"/>
  <rect x="224" y="314" width="5" height="40" fill="#c5b49a" rx="2"/>
  <rect x="260" y="314" width="5" height="40" fill="#c5b49a" rx="2"/>
  <rect x="296" y="314" width="5" height="40" fill="#c5b49a" rx="2"/>
  <rect x="332" y="314" width="5" height="40" fill="#c5b49a" rx="2"/>
  <rect x="368" y="314" width="5" height="40" fill="#c5b49a" rx="2"/>
  <rect x="404" y="314" width="5" height="40" fill="#c5b49a" rx="2"/>
  <rect x="440" y="314" width="5" height="40" fill="#c5b49a" rx="2"/>
  <rect x="476" y="314" width="5" height="40" fill="#c5b49a" rx="2"/>
  <rect x="512" y="314" width="5" height="40" fill="#c5b49a" rx="2"/>
  <rect x="548" y="314" width="5" height="40" fill="#c5b49a" rx="2"/>
  <rect x="584" y="314" width="5" height="40" fill="#c5b49a" rx="2"/>
