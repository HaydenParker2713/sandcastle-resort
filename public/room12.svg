  <line x1="0" y1="362" x2="600" y2="362" stroke="#d0bea0" stroke-width="1"/>
  <line x1="0" y1="374" x2="600" y2="374" stroke="#d0bea0" stroke-width="1"/>
  <line x1="0" y1="386" x2="600" y2="386" stroke="#d0bea0" stroke-width="1"/>
