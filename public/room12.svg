  <!-- Cloud left -->
  <ellipse cx="120" cy="78" rx="72" ry="22" fill="white" opacity="0.18"/>
  <ellipse cx="165" cy="66" rx="52" ry="20" fill="white" opacity="0.14"/>
  <!-- Cloud right -->
  <ellipse cx="360" cy="55" rx="55" ry="18" fill="white" opacity="0.14"/>
  <!-- Ocean -->
  <rect y="255" width="600" height="100" fill="url(#ocean12)"/>
  <!-- Sun trail on water -->
  <path d="M390,270 Q435,265 480,272 Q525,278 555,268 L555,285 Q520,295 480,290 Q435,283 390,285Z" fill="#fcd34d" opacity="0.28"/>
  <!-- Waves -->
  <path d="M0,265 C80,257 160,275 240,265 C320,255 400,273 480,265 C538,258 570,268 600,265 L600,278 L0,278Z" fill="#38bdf8" opacity="0.48"/>
  <path d="M0,288 C70,280 155,298 240,288 C325,278 410,296 490,288 C545,282 574,292 600,288 L600,303 L0,303Z" fill="#0ea5e9" opacity="0.32"/>
