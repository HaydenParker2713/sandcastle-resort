<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="sky2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0369a1"/>
      <stop offset="40%" stop-color="#38bdf8"/>
      <stop offset="75%" stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#e0f2fe"/>
    </linearGradient>
    <linearGradient id="ocean2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#0c4a6e"/>
    </linearGradient>
    <linearGradient id="sand2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
  </defs>
  <!-- Sky -->
  <rect width="600" height="280" fill="url(#sky2)"/>
  <!-- Sun -->
  <circle cx="480" cy="80" r="42" fill="#fef9c3" opacity="0.9"/>
  <circle cx="480" cy="80" r="30" fill="#fef08a"/>
  <!-- Clouds -->
  <ellipse cx="120" cy="70" rx="80" ry="24" fill="white" opacity="0.9"/>
  <ellipse cx="160" cy="58" rx="60" ry="22" fill="white" opacity="0.95"/>
  <ellipse cx="80" cy="75" rx="45" ry="18" fill="white" opacity="0.85"/>
  <ellipse cx="350" cy="45" rx="55" ry="18" fill="white" opacity="0.75"/>
  <ellipse cx="390" cy="38" rx="40" ry="15" fill="white" opacity="0.7"/>
  <!-- Seagulls -->
  <path d="M200,110 Q205,105 210,110" stroke="#1e3a5f" stroke-width="2" fill="none"/>
  <path d="M215,108 Q220,103 225,108" stroke="#1e3a5f" stroke-width="2" fill="none"/>
  <path d="M320,90 Q326,85 332,90" stroke="#1e3a5f" stroke-width="2" fill="none"/>
  <path d="M338,88 Q344,83 350,88" stroke="#1e3a5f" stroke-width="2" fill="none"/>
  <!-- Horizon haze -->
  <rect y="270" width="600" height="16" fill="#bae6fd" opacity="0.5"/>
  <!-- Ocean -->
  <rect y="280" width="600" height="80" fill="url(#ocean2)"/>
  <!-- Waves -->
  <path d="M0,290 C60,282 130,300 200,290 C270,280 340,298 410,290 C470,283 530,294 600,290 L600,302 L0,302Z" fill="#67e8f9" opacity="0.4"/>
  <path d="M0,310 C70,302 150,320 230,310 C310,300 390,318 470,310 C520,304 560,314 600,310 L600,325 L0,325Z" fill="#22d3ee" opacity="0.3"/>
  <!-- Sailboat -->
  <path d="M280,268 L292,250 L298,268Z" fill="#0c4a6e" opacity="0.7"/>
  <line x1="292" y1="268" x2="292" y2="250" stroke="#0c4a6e" stroke-width="1.5" opacity="0.7"/>
  <!-- Distant boat -->
  <path d="M150,272 L158,262 L164,272Z" fill="#0c4a6e" opacity="0.5"/>
  <line x1="158" y1="272" x2="158" y2="262" stroke="#0c4a6e" stroke-width="1.2" opacity="0.5"/>
  <!-- Sandy shore -->
  <rect y="355" width="600" height="45" fill="url(#sand2)"/>
  <!-- Shore foam -->
  <path d="M0,355 C100,350 200,360 300,355 C400,350 500,360 600,355 L600,362 L0,362Z" fill="white" opacity="0.6"/>
  <!-- Window frame overlay -->
  <rect x="0" y="0" width="600" height="400" fill="none" stroke="#d4a853" stroke-width="10" rx="2"/>
  <rect x="0" y="0" width="600" height="400" fill="none" stroke="#b8832a" stroke-width="3" rx="2"/>
</svg>
