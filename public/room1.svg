<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="sky1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="45%" stop-color="#1e4d8c"/>
      <stop offset="78%" stop-color="#c2511a"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="ocean1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a7fad"/>
      <stop offset="100%" stop-color="#0c3d5e"/>
    </linearGradient>
    <linearGradient id="deck1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7ede0"/>
      <stop offset="100%" stop-color="#e0cdb0"/>
    </linearGradient>
  </defs>
  <!-- Sky -->
  <rect width="600" height="290" fill="url(#sky1)"/>
