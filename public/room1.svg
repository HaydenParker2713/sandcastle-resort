  <circle cx="220" cy="38" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="320" cy="18" r="1" fill="white" opacity="0.8"/>
  <circle cx="80" cy="52" r="1" fill="white" opacity="0.5"/>
