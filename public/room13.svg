  <ellipse cx="28" cy="70"  rx="30" ry="11" fill="#4ade80" transform="rotate(58 28 70)"/>
  <ellipse cx="12" cy="62"  rx="24" ry="9"  fill="#86efac" transform="rotate(-12 12 62)"/>
