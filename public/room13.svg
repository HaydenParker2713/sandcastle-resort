  <circle cx="130" cy="85"  r="1.5" fill="#fef9c3"/>
  <!-- Grand sun setting -->
  <circle cx="300" cy="282" r="90" fill="#ea580c" opacity="0.18"/>
  <circle cx="300" cy="282" r="65" fill="#f59e0b" opacity="0.3"/>
  <circle cx="300" cy="282" r="42" fill="#fcd34d" opacity="0.65"/>
  <circle cx="300" cy="282" r="26" fill="#fef9c3" opacity="0.95"/>
