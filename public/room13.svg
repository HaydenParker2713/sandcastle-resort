  <rect x="150" y="120" width="12" height="185" fill="#5c330a" rx="4"/>
  <ellipse cx="156" cy="112" rx="38" ry="15" fill="#22c55e" transform="rotate(-4 156 112)"/>
  <ellipse cx="130" cy="126" rx="34" ry="11" fill="#16a34a" transform="rotate(-40 130 126)"/>
  <ellipse cx="184" cy="126" rx="34" ry="11" fill="#16a34a" transform="rotate(36 184 126)"/>
  <ellipse cx="138" cy="104" rx="26" ry="9"  fill="#4ade80" transform="rotate(-58 138 104)"/>
  <ellipse cx="174" cy="104" rx="26" ry="9"  fill="#4ade80" transform="rotate(54 174 104)"/>
  <!-- Palm far right -->
  <rect x="581" y="90" width="14" height="218" fill="#5c330a" rx="5"/>
  <ellipse cx="588" cy="80"  rx="44" ry="17" fill="#22c55e" transform="rotate(6 588 80)"/>
  <ellipse cx="556" cy="96"  rx="38" ry="13" fill="#16a34a" transform="rotate(-40 556 96)"/>
  <ellipse cx="620" cy="96"  rx="38" ry="13" fill="#16a34a" transform="rotate(44 620 96)"/>
  <ellipse cx="572" cy="70"  rx="30" ry="11" fill="#4ade80" transform="rotate(-58 572 70)"/>
  <ellipse cx="604" cy="70"  rx="30" ry="11" fill="#4ade80" transform="rotate(62 604 70)"/>
  <ellipse cx="588" cy="62"  rx="24" ry="9"  fill="#86efac" transform="rotate(12 588 62)"/>
