  <rect x="438" y="120" width="12" height="185" fill="#5c330a" rx="4"/>
  <ellipse cx="444" cy="112" rx="38" ry="15" fill="#22c55e" transform="rotate(4 444 112)"/>
  <ellipse cx="416" cy="126" rx="34" ry="11" fill="#16a34a" transform="rotate(-36 416 126)"/>
  <ellipse cx="472" cy="126" rx="34" ry="11" fill="#16a34a" transform="rotate(40 472 126)"/>
  <ellipse cx="426" cy="104" rx="26" ry="9"  fill="#4ade80" transform="rotate(-54 426 104)"/>
  <ellipse cx="462" cy="104" rx="26" ry="9"  fill="#4ade80" transform="rotate(58 462 104)"/>
</svg>
