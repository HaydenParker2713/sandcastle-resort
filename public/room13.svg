  <path d="M80,248 L92,230 L100,248Z" fill="#0c3d5e" opacity="0.55"/>
  <line x1="92" y1="248" x2="92" y2="230" stroke="#0c3d5e" stroke-width="1.5" opacity="0.55"/>
  <path d="M220,242 L232,226 L240,242Z" fill="#0c3d5e" opacity="0.5"/>
  <line x1="232" y1="242" x2="232" y2="226" stroke="#0c3d5e" stroke-width="1.5" opacity="0.5"/>
  <path d="M380,245 L390,230 L398,245Z" fill="#0c3d5e" opacity="0.55"/>
  <line x1="390" y1="245" x2="390" y2="230" stroke="#0c3d5e" stroke-width="1.5" opacity="0.55"/>
  <path d="M490,240 L502,222 L510,240Z" fill="#0c3d5e" opacity="0.5"/>
  <line x1="502" y1="240" x2="502" y2="222" stroke="#0c3d5e" stroke-width="1.5" opacity="0.5"/>
