<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="sky13" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050d1a"/>
      <stop offset="25%" stop-color="#0f2850"/>
      <stop offset="50%" stop-color="#7c1d6f"/>
      <stop offset="70%" stop-color="#ea580c"/>
      <stop offset="85%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fef3c7"/>
    </linearGradient>
    <linearGradient id="ocean13" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a6fa0"/>
      <stop offset="100%" stop-color="#071e30"/>
    </linearGradient>
    <linearGradient id="beach13" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>
  <!-- Sky -->
  <rect width="600" height="285" fill="url(#sky13)"/>
  <!-- Stars - more visible in deep sky -->
  <circle cx="40"  cy="18"  r="1.5" fill="white" opacity="0.9"/>
  <circle cx="90"  cy="8"   r="1.2" fill="white" opacity="0.8"/>
  <circle cx="155" cy="25"  r="1.5" fill="white" opacity="0.85"/>
  <circle cx="210" cy="10"  r="1"   fill="white" opacity="0.75"/>
  <circle cx="265" cy="32"  r="1.3" fill="white" opacity="0.8"/>
  <circle cx="355" cy="12"  r="1.5" fill="white" opacity="0.85"/>
  <circle cx="415" cy="28"  r="1"   fill="white" opacity="0.7"/>
  <circle cx="470" cy="8"   r="1.4" fill="white" opacity="0.8"/>
  <circle cx="525" cy="22"  r="1.2" fill="white" opacity="0.75"/>
  <circle cx="572" cy="40"  r="1"   fill="white" opacity="0.7"/>
  <circle cx="70"  cy="52"  r="1"   fill="white" opacity="0.6"/>
  <circle cx="180" cy="60"  r="1.2" fill="white" opacity="0.65"/>
